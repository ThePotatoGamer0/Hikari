name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Setup QEMU to allow building for different architectures
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 2. Setup Buildx for multi-platform builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # This builds for both standard PC (amd64) and your Raspberry Pi (arm64)
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/thepotatogamer0/hikari:latest